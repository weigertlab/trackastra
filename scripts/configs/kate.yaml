name: kate
ndim: 3
epochs: 500
warmup_epochs: 0
augment: 3
augment_details:
  jitter: 0.5
  drift: 4.0
  tilt: 20
  # frame_jump: 5
  # frame_jump_p: 0.05
window: 4
batch_size: 32
features: wrfeat2
attn_dist_mode: none
attn_mode: sparse
head_mode: edge_mlp
max_neighbors: 16
div_upweight: 2.0
sparse_knn_mode: per_frame
balance_batch_objects: true
delta_cutoff: 1
num_encoder_layers: 6
causal_norm: none
node_loss: 0.1
cache: true
cachedir: runs/.cache
d_model: 256
dropout: 0.05
detect_drop: 0.1
feature_drop: 0.1
pos_embed_per_dim: 32
lr: 0.0001
focal_loss_gamma: 0.0
train_samples: 8192
tracking_frequency: 5
tracking_mode: greedy
spatial_cutoff: 100  #um
max_detections: 320
weight_by_dataset: false
oversample_divs: 0.0  


input_train:
- format: geff
  sparse_gt: true
  spacing: [.406, .406, .406]
  match_max_distance: 6
  paths:
  - data/kate/gt/140521_DorsalAorta_Cells
  - data/kate/gt/140521_GT_Divisions_RandomTPs
  - data/kate/gt/140521_NeuralTube_Divisions
  - data/kate/gt/140521_Notochord_Cells
  - data/kate/gt/140521_Notochord_Divisions
  - data/kate/gt/140521_Somite_Divisions
  - data/kate/gt/140521_TailBud_Cells

input_val:
- format: geff
  sparse_gt: true
  spacing: [.406, .406, .406]
  match_max_distance: 6
  paths:
  - data/kate/gt/140521_VE_Cells
  - data/kate/gt/140521_Notochord_Divisions


input_test:
- format: geff
  sparse_gt: true
  spacing: [.406, .406, .406]
  match_max_distance: 6
  paths:
  - data/kate/gt/140521_VE_Cells
  - data/kate/gt/140521_Notochord_Divisions
