name: general3d
ndim: 3
epochs: 500
warmup_epochs: 0
augment: 3
augment_details:
  jitter: 0.5
  drift: 4.0
  tilt: 20
  # frame_jump: 5
  # frame_jump_p: 0.05
window: 4
batch_size: 32
features: wrfeat2
attn_dist_mode: none
attn_mode: sparse
head_mode: edge_mlp
max_neighbors: 8
div_upweight: 1.0
sparse_knn_mode: per_frame
balance_batch_objects: true
delta_cutoff: 1
num_encoder_layers: 6
causal_norm: none
node_loss: 0.1
cache: true
cachedir: runs/.cache
d_model: 320
dropout: 0.05
detect_drop: 0.1
feature_drop: 0.1
pos_embed_per_dim: 32
lr: 0.0001
focal_loss_gamma: 0.0
train_samples: 8192
tracking_frequency: 5
tracking_mode: greedy
spatial_cutoff: 100  #um
max_detections: 320
weight_by_dataset: false
# oversample_divs: 0.5  

input_train:
- format: geff
  sparse_gt: true
  spacing: [1.625, 0.40625, 0.40625]
  match_max_distance: 5
  paths:
  - data/biohub/final_fixed/44b6_f28707c6
  - data/biohub/final_fixed/6bba_05b6850b
  # - data/biohub/final_fixed/6bba_05db0fb1
