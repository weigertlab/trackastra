name: demo3d
ndim: 3
epochs: 2
warmup_epochs: 1
augment: 0
window: 4
features: intensity
attn_dist_mode: none
attn_mode: sparse
max_neighbors:
- 16
delta_cutoff: 1
num_encoder_layers: 2
causal_norm: quiet_softmax
cache: true
cachedir: runs/.cache
d_model: 128
dropout: 0.05
detect_drop: 0.0
pos_embed_per_dim: 32
lr: 0.0001
focal_loss_gamma: 0.0
train_samples: 256
tracking_frequency: -1
tracking_mode: greedy
spatial_cutoff: 256
normalize_diameter: null
max_detections: 512
batch_size: 4
weight_by_dataset: true
oversample_divs: 0.0
detection_folders:
- TRA

# Requires grouped CTC/GEFF input support from ctcgeff.md.
input_train:
- format: ctc
  sparse_gt: false
  spacing: [1, 1, 1]
  paths:
  - ./scripts/data/ctc_2026/3d/Fluo-N3DH-CE/01
  - ./scripts/data/ctc_2026/3d/Fluo-N3DH-CE/02
- format: geff
  sparse_gt: true
  spacing: auto
  match_max_distance: 16
  paths:
  - ../biohub_kaggle/data/single_demo

input_val:
- format: ctc
  sparse_gt: false
  spacing: [1, 1, 1]
  paths:
  - ./scripts/data/ctc_2026/3d/Fluo-N3DH-CE/02
- format: geff
  sparse_gt: true
  spacing: auto
  match_max_distance: 16
  paths:
  - ../biohub_kaggle/data/single_demo
